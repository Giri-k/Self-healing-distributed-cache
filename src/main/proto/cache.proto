syntax = "proto3";

package cache;

option java_package = "com.cache.grpc.generated";
option java_multiple_files = true;

service CacheService {
    rpc Get (GetRequest) returns (GetResponse);
    rpc Set (SetRequest) returns (SetResponse);
    rpc Delete (DeleteRequest) returns (DeleteResponse);
    rpc Replicate (ReplicateRequest) returns (ReplicateResponse);
}

message GetRequest {
    string key = 1;
}

message GetResponse {
    string value = 1;
    bool found = 2;
}

message SetRequest {
    string key = 1;
    string value = 2;
    int64 ttl_seconds = 3;
}

message SetResponse {
  bool success = 1;
}

message DeleteRequest {
    string key = 1;
}

message DeleteResponse {
    bool success = 1;
}

message ReplicateRequest {
    string key = 1;
    string value = 2;
    int64 version = 3;
    int64 expires_at = 4;
}

message ReplicateResponse {
    bool success = 1;
}