version: '3.8'
services:
  node-1:
    build: .
    ports:
      - "9090:9090"
    environment:
      - GRPC_SERVER_PORT=9090
      - CACHE_NODE_ID=node-1
      - CACHE_PEERS=node-2:node-2:9090,node-3:node-3:9090
      - CACHE_VIRTUAL_NODES=150
      - CACHE_REPLICATION_FACTOR=2
      - CACHE_PING_INTERVAL_MS=1000
      - CACHE_PING_TIMEOUT_MS=500
      - CACHE_SUSPECT_TIMEOUT_MS=5000

  node-2:
    build: .
    ports:
      - "9091:9090"
    environment:
      - GRPC_SERVER_PORT=9090
      - CACHE_NODE_ID=node-2
      - CACHE_PEERS=node-1:node-1:9090,node-3:node-3:9090
      - CACHE_VIRTUAL_NODES=150
      - CACHE_REPLICATION_FACTOR=2
      - CACHE_PING_INTERVAL_MS=1000
      - CACHE_PING_TIMEOUT_MS=500
      - CACHE_SUSPECT_TIMEOUT_MS=5000

  node-3:
    build: .
    ports:
      - "9092:9090"
    environment:
      - GRPC_SERVER_PORT=9090
      - CACHE_NODE_ID=node-3
      - CACHE_PEERS=node-1:node-1:9090,node-2:node-2:9090
      - CACHE_VIRTUAL_NODES=150
      - CACHE_REPLICATION_FACTOR=2
      - CACHE_PING_INTERVAL_MS=1000
      - CACHE_PING_TIMEOUT_MS=500
      - CACHE_SUSPECT_TIMEOUT_MS=5000
